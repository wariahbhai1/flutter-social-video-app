name: social_video_app
description: A modern social video app like Instagram Reels with Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.4.0

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7

  # Video Player
  video_player: ^2.8.1
  chewie: ^1.7.1

  # Image Handling
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4

  # Storage & Local Data
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0

  # Networking
  http: ^1.1.0
  dio: ^5.3.1

  # Charts & Analytics
  fl_chart: ^0.64.0

  # Notifications & Utils
  intl: ^0.19.0
  uuid: ^4.0.0

  # Animation & Lottie
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
